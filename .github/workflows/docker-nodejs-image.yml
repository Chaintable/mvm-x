name: docker-nodejs-image
run-name: Build nodejs image ${{ inputs.target }}/${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: true
        default: 'dev'
      target:
        description: 'Target'
        required: true
        type: choice
        options:
          - dtl
          - relayer
          - batch-submitter

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v1
        with:
          version: latest

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: metisdao
          password: ${{ secrets.METIS_DOCKER_ACCESS_KEY  }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          pull: true
          context: .
          tags: metisdao/${{ inputs.target }}:${{ inputs.version }}
          file: ./ops/docker/Dockerfile
          target: ${{ inputs.target }}
          cache-from: type=gha,scope=buildkit-nodejs-${{ runner.os }}-${{ runner.arch }}
          cache-to: type=gha,mode=max,scope=buildkit-nodejs-${{ runner.os }}-${{ runner.arch }}
          platforms: linux/amd64
          provenance: false
          sbom: false
