name: docker-golang-image
run-name: Build golang image ${{ inputs.target }}/${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        default: 'dev'
        required: true
      target:
        description: 'Target'
        required: true
        type: choice
        options:
          - l2geth
          - challenger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v1
        with:
          version: latest

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: metisdao
          password: ${{ secrets.METIS_DOCKER_ACCESS_KEY  }}

      - name: Build for l2geth
        uses: docker/build-push-action@v6
        if: ${{ inputs.target == 'l2geth' }}
        with:
          push: true
          pull: true
          context: .
          tags: metisdao/l2geth:${{ inputs.version }}
          file: ./ops/docker/Dockerfile.geth
          cache-from: type=gha,scope=buildkit-l2geth-${{ runner.os }}-${{ runner.arch }}
          cache-to: type=gha,mode=max,scope=buildkit-l2geth-${{ runner.os }}-${{ runner.arch }}
          platforms: linux/amd64
          provenance: false
          sbom: false

      - name: Build for challenger
        uses: docker/build-push-action@v6
        if: ${{ inputs.target == 'challenger' }}
        with:
          push: true
          pull: true
          context: .
          tags: metisdao/challenger:${{ inputs.version }}
          file: ./ops/docker/Dockerfile.challenger
          cache-from: type=gha,scope=buildkit-challenger-${{ runner.os }}-${{ runner.arch }}
          cache-to: type=gha,mode=max,scope=buildkit-challenger-${{ runner.os }}-${{ runner.arch }}
          platforms: linux/amd64
          provenance: false
          sbom: false
